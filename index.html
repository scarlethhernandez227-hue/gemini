<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高保真打车动效原型</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 引入 Babel 用于在浏览器中解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
      /* 适配底部安全距离 */
      .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body class="bg-gray-100">
    <!-- React 挂载点 -->
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      // --- 替代 lucide-react 的图标组件 ---
      // 修改：增加了 ...props 以便透传 onClick 等事件
      const IconBase = ({ children, className = "w-4 h-4", ...props }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
          {children}
        </svg>
      );
      const ChevronLeft = ({className}) => <IconBase className={className}><polyline points="15 18 9 12 15 6" /></IconBase>;
      const MapIcon = ({className}) => <IconBase className={className}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6" /><line x1="9" y1="3" x2="9" y2="21" /><line x1="15" y1="3" x2="15" y2="21" /></IconBase>;
      const User = ({className}) => <IconBase className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconBase>;
      const Briefcase = ({className}) => <IconBase className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconBase>;
      const Info = ({className}) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></IconBase>;
      const ChevronDown = ({className}) => <IconBase className={className}><polyline points="6 9 12 15 18 9"/></IconBase>;
      const ChevronUp = ({className}) => <IconBase className={className}><polyline points="18 15 12 9 6 15"/></IconBase>;
      const ArrowRight = ({className}) => <IconBase className={className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></IconBase>;
      const CheckCircle2 = ({className}) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconBase>;
      const Heart = ({className}) => <IconBase className={className}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></IconBase>;
      const MapPin = ({className, fill}) => (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3" fill="white"/>
        </svg>
      );
      const Sparkles = ({className}) => <IconBase className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconBase>;
      const Send = ({className}) => <IconBase className={className}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></IconBase>;
      
      // 修改：为关闭按钮组件增加 ...props 接收
      const X = ({className, ...props}) => <IconBase className={className} {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
      
      const ChevronRightIcon = ({ className = "w-4 h-4 text-gray-400 ml-1" }) => <IconBase className={className}><polyline points="9 18 15 12 9 6" /></IconBase>;

      // --- 主应用代码 ---
      const RideHailingApp = () => {
        const [selectedSku, setSelectedSku] = useState('economy');
        const [isMoreBrandsExpanded, setIsMoreBrandsExpanded] = useState(false);
        const [currentPrice, setCurrentPrice] = useState(76);

        // AI 问答相关状态
        const [isChatExpanded, setIsChatExpanded] = useState(false);
        const [chatInput, setChatInput] = useState('');
        const [chatMessages, setChatMessages] = useState([
          { role: 'ai', content: '您好！我是AI智能助手，结合大模型为您个性化选车。您可以直接告诉我您的特殊需求（如：3个大行李箱、带宠物等）。' }
        ]);
        const messagesEndRef = React.useRef(null);

        // 对话自动滚动到底部
        React.useEffect(() => {
          if (messagesEndRef.current && isChatExpanded) {
            messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
          }
        }, [chatMessages, isChatExpanded]);

        // 发送消息逻辑
        const handleSendMessage = (text = chatInput) => {
          if (!text.trim()) return;
          const newUserMsg = { role: 'user', content: text };
          setChatMessages(prev => [...prev, newUserMsg]);
          setChatInput('');
          setIsChatExpanded(true); // 确保面板展开
          
          // 模拟大模型思考并回复
          setTimeout(() => {
            setChatMessages(prev => [...prev, { 
              role: 'ai', 
              content: `关于“${text}”，我通过算法测算，建议您优先选择下方【6座商务车】或【舒适型】，空间更宽裕，能为您提供更好的出行体验哦。` 
            }]);
          }, 800);
        };

        const moreOptions = [
          { id: 'more-1', title: '经济型', provider: '阳光出行', price: 59, tags: '免费等60分钟 · 用车前2h免费取消' },
          { id: 'more-2', title: '舒适型', provider: '神州专车', price: 82, tags: '免费等60分钟 · 用车前2h免费取消' },
          { id: 'more-3', title: '6座商务车', provider: '首汽约车', price: 128, tags: '免费等60分钟 · 用车前2h免费取消' }
        ];
        
        const [activeMoreId, setActiveMoreId] = useState('more-1');
        const activeMore = moreOptions.find(o => o.id === activeMoreId);

        const handleSelect = (id, price) => {
          setSelectedSku(id);
          setCurrentPrice(price);
        };

        const handleMoreCardClick = () => {
          setIsMoreBrandsExpanded(!isMoreBrandsExpanded);
          if (!selectedSku.startsWith('more-')) {
            handleSelect(activeMoreId, activeMore.price);
          }
        };

        const handleSubItemClick = (e, opt) => {
          e.stopPropagation();
          handleSelect(opt.id, opt.price);
          setActiveMoreId(opt.id);
        };

        const CarIcon = ({ type }) => {
          switch(type) {
            case 'sedan':
              return (
                <svg viewBox="0 0 64 32" className="w-16 h-8 fill-current text-gray-800">
                  <path d="M10,20 A4,4 0 1,0 18,20 A4,4 0 1,0 10,20 M46,20 A4,4 0 1,0 54,20 A4,4 0 1,0 46,20 M14,12 L22,4 L38,4 L46,12 L56,12 C58,12 60,14 60,16 L60,20 L54,20 A6,6 0 0,1 46,20 L18,20 A6,6 0 0,1 10,20 L4,20 L4,16 C4,14 6,12 8,12 Z" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/>
                  <path d="M22,4 L22,12 M38,4 L38,12" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/>
                </svg>
              );
            case 'van':
              return (
                <svg viewBox="0 0 64 32" className="w-16 h-8 fill-current text-gray-800">
                  <path d="M10,22 A4,4 0 1,0 18,22 A4,4 0 1,0 10,22 M46,22 A4,4 0 1,0 54,22 A4,4 0 1,0 46,22 M8,8 L20,4 L48,4 L56,12 L58,16 L58,22 L54,22 A6,6 0 0,1 46,22 L18,22 A6,6 0 0,1 10,22 L6,22 L6,12 Z" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/>
                  <path d="M24,4 L24,14 M40,4 L40,14" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/>
                </svg>
              );
            case 'luxury':
              return (
                <svg viewBox="0 0 64 32" className="w-16 h-8 fill-current text-gray-800">
                  <path d="M12,20 A4,4 0 1,0 20,20 A4,4 0 1,0 12,20 M44,20 A4,4 0 1,0 52,20 A4,4 0 1,0 44,20 M16,12 L26,6 L42,6 L50,12 L60,12 C62,12 62,14 62,16 L62,20 L52,20 A6,6 0 0,1 44,20 L20,20 A6,6 0 0,1 12,20 L2,20 L2,16 C2,14 4,12 8,12 Z" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/>
                  <path d="M26,6 L26,12 M42,6 L42,12 M50,12 L60,12" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/>
                </svg>
              );
            case 'autonomous':
              return (
                <svg viewBox="0 0 64 32" className="w-16 h-8 fill-current text-gray-800">
                  <path d="M8,20 A4,4 0 1,0 16,20 A4,4 0 1,0 8,20 M48,20 A4,4 0 1,0 56,20 A4,4 0 1,0 48,20 M12,12 L20,6 L44,6 L52,12 L58,12 C60,12 62,14 62,16 L62,20 L56,20 A6,6 0 0,1 48,20 L16,20 A6,6 0 0,1 8,20 L2,20 L2,16 C2,14 4,12 6,12 Z" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/>
                  <path d="M20,6 L20,12 M44,6 L44,12" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/>
                  <path d="M28,6 L28,4 C28,2 36,2 36,4 L36,6" fill="#E5E7EB" stroke="currentColor" strokeWidth="1"/>
                  <path d="M24,3 C24,3 32,-1 40,3" fill="none" stroke="#3B82F6" strokeWidth="1.5" strokeLinecap="round" opacity="0.8"/>
                  <path d="M22,0 C22,0 32,-4 42,0" fill="none" stroke="#3B82F6" strokeWidth="1.5" strokeLinecap="round" opacity="0.5"/>
                </svg>
              );
            case 'box':
              return (
                <svg viewBox="0 0 64 64" className="w-12 h-12">
                  <rect x="8" y="16" width="48" height="40" rx="4" fill="#E5E7EB" />
                  <path d="M12 24 L52 24 M12 32 L52 32 M24 16 L24 8 C24 6 26 4 28 4 L36 4 C38 4 40 6 40 8 L40 16" stroke="#9CA3AF" strokeWidth="3" fill="none" strokeLinejoin="round"/>
                  <rect x="16" y="28" width="32" height="20" rx="2" fill="#D1D5DB" />
                  <path d="M24 34 L40 34 M24 40 L36 40" stroke="#9CA3AF" strokeWidth="2" strokeLinecap="round"/>
                  <text x="12" y="14" fontSize="8" fill="#fff" className="bg-gray-400">MORE</text>
                </svg>
              );
            default:
              return null;
          }
        };

        return (
          <div className="w-full max-w-md mx-auto bg-[#F5F5F7] min-h-screen relative font-sans shadow-2xl overflow-hidden pb-40">
            
            {/* 顶部导航 */}
            <div className="bg-white sticky top-0 z-20 px-4 pt-12 pb-3 shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <ChevronLeft className="w-6 h-6 text-gray-800" />
                <div className="flex-1 flex flex-col items-center justify-center">
                  <div className="flex items-center space-x-2">
                    <span className="text-lg font-bold text-gray-900">虹桥机场T2</span>
                    <ArrowRight className="w-4 h-4 text-gray-400" />
                    <span className="text-lg font-bold text-gray-900">嘉海雅苑北区...</span>
                  </div>
                  <div className="text-xs text-gray-500 mt-0.5">航班落地后用车(预计行驶14公里 18分钟)</div>
                </div>
                <div className="flex flex-col items-center justify-center bg-gray-100 rounded-full px-3 py-1.5 ml-2">
                  <MapIcon className="w-4 h-4 text-gray-700" />
                  <span className="text-[10px] text-gray-700 font-medium">地图</span>
                </div>
              </div>
            </div>

            {/* 列表区域 */}
            <div className="px-3 pt-3 space-y-3">

              {/* === AI 智能问答模块 === */}
              {/* 1. 缩起状态 (高屏效，三行) */}
              {!isChatExpanded && (
                <div 
                  className="bg-gradient-to-r from-[#F0F7FF] to-white border border-blue-100 rounded-2xl p-3 shadow-sm cursor-pointer transition-all hover:shadow-md"
                >
                  {/* 第一行：标题与标签 */}
                  <div className="flex items-center justify-between mb-2">
                    <div className="flex items-center text-sm font-bold text-blue-800">
                      <Sparkles className="w-4 h-4 mr-1.5 text-blue-500 fill-blue-500" />
                      AI 智能选车助手
                    </div>
                    <span className="text-[10px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded font-medium">大模型赋能</span>
                  </div>
                  {/* 第二行：引导输入框区域 */}
                  <div 
                    onClick={() => setIsChatExpanded(true)}
                    className="bg-white rounded-lg p-2 text-xs text-gray-400 flex items-center mb-2 border border-gray-100 shadow-inner"
                  >
                    <span className="flex-1">输入 "带两只猫"，帮您推荐宠物友好车...</span>
                    <div className="bg-blue-500 text-white rounded p-1"><ArrowRight className="w-3 h-3" /></div>
                  </div>
                  {/* 第三行：快捷指令 Chip */}
                  <div className="flex space-x-2 overflow-x-auto [&::-webkit-scrollbar]:hidden" style={{ scrollbarWidth: 'none' }}>
                    <span onClick={(e) => { e.stopPropagation(); handleSendMessage("带宠物怎么选？"); }} className="text-[11px] text-gray-600 bg-white border border-gray-200 px-2.5 py-1 rounded-full whitespace-nowrap active:bg-gray-50">带宠物怎么选？</span>
                    <span onClick={(e) => { e.stopPropagation(); handleSendMessage("商务接待推荐"); }} className="text-[11px] text-gray-600 bg-white border border-gray-200 px-2.5 py-1 rounded-full whitespace-nowrap active:bg-gray-50">商务接待推荐</span>
                    <span onClick={(e) => { e.stopPropagation(); handleSendMessage("性价比最高"); }} className="text-[11px] text-gray-600 bg-white border border-gray-200 px-2.5 py-1 rounded-full whitespace-nowrap active:bg-gray-50">性价比最高</span>
                  </div>
                </div>
              )}

              {/* 2. 展开状态 (对话流) */}
              {isChatExpanded && (
                <div className="bg-white border border-blue-200 rounded-2xl shadow-lg flex flex-col overflow-hidden transition-all h-[360px]">
                  {/* 头部 */}
                  <div className="flex justify-between items-center p-3 bg-gradient-to-r from-blue-50 to-white border-b border-blue-50">
                    <div className="flex items-center text-sm font-bold text-blue-800">
                      <Sparkles className="w-4 h-4 mr-1.5 text-blue-500 fill-blue-500" />
                      AI 智能选车助手
                    </div>
                    <X className="w-5 h-5 text-gray-400 cursor-pointer hover:text-gray-600 p-0.5" onClick={() => setIsChatExpanded(false)} />
                  </div>
                  
                  {/* 聊天消息区 */}
                  <div className="flex-1 overflow-y-auto p-3 space-y-3 bg-gray-50/50">
                    {chatMessages.map((msg, idx) => (
                      <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                        {msg.role === 'ai' && <Sparkles className="w-3 h-3 text-blue-400 mr-1 mt-1 flex-shrink-0" />}
                        <div className={`max-w-[85%] rounded-2xl px-3 py-2 text-[13px] leading-relaxed ${
                          msg.role === 'user' 
                          ? 'bg-blue-500 text-white rounded-tr-sm' 
                          : 'bg-white text-gray-700 border border-gray-100 shadow-sm rounded-tl-sm'
                        }`}>
                          {msg.content}
                        </div>
                      </div>
                    ))}
                    <div ref={messagesEndRef} />
                  </div>

                  {/* 输入区 */}
                  <div className="p-3 bg-white border-t border-gray-100 flex items-center space-x-2">
                    <input 
                      type="text" 
                      value={chatInput}
                      onChange={(e) => setChatInput(e.target.value)}
                      onKeyDown={(e) => e.key === 'Enter' && handleSendMessage()}
                      className="flex-1 bg-gray-100 rounded-full px-4 py-2 text-[13px] focus:outline-none focus:ring-1 focus:ring-blue-400 placeholder-gray-400" 
                      placeholder="告诉助手您的特殊用车需求..." 
                    />
                    <button 
                      onClick={() => handleSendMessage()}
                      className={`p-2 rounded-full flex-shrink-0 transition-colors ${chatInput.trim() ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-400'}`}
                    >
                      <Send className="w-4 h-4 ml-[-2px]" />
                    </button>
                  </div>
                </div>
              )}
              {/* === AI 智能问答模块 结束 === */}

              {/* 经济型 SKU */}
              <div 
                onClick={() => handleSelect('economy', 76)}
                className={`bg-white rounded-2xl p-4 transition-all duration-200 cursor-pointer relative ${
                  selectedSku === 'economy' ? 'border-2 border-black ring-4 ring-gray-100' : 'border-2 border-transparent'
                }`}
              >
                <div className="absolute top-0 left-0 bg-gray-200 text-gray-700 text-[10px] px-2 py-0.5 rounded-br-lg rounded-tl-xl font-medium">
                  最近预订
                </div>

                <div className="flex justify-between items-start mt-2">
                  <div className="flex items-start space-x-3">
                    <div className="mt-1">
                      <CarIcon type="sedan" />
                    </div>
                    <div>
                      <div className="flex items-center space-x-2">
                        <span className="text-lg font-bold text-gray-900">经济型</span>
                        <div className="flex items-center text-gray-500 text-xs">
                          <User className="w-3.5 h-3.5 mr-0.5" /> 4
                          <Briefcase className="w-3.5 h-3.5 ml-1.5 mr-0.5" /> 2
                          <Info className="w-3.5 h-3.5 ml-1.5" />
                        </div>
                      </div>
                      <div className="flex items-center text-sm text-gray-700 mt-1">
                        <span className="font-medium">携程专车</span>
                      </div>
                      <div className="flex items-center text-xs text-gray-500 mt-1">
                        <CheckCircle2 className="w-3 h-3 mr-1 text-gray-400" /> 无限免费等 · 随时取消 · 迟到免单
                      </div>
                    </div>
                  </div>

                  <div className="text-right flex flex-col items-end">
                    <div className="flex items-baseline space-x-1">
                      <span className="text-xs text-gray-400 line-through">¥101</span>
                      <span className="text-xl font-bold text-gray-900">¥76</span>
                    </div>
                    <span className="text-[10px] text-[#ff5a5f] bg-red-50 px-1 py-0.5 rounded mt-1">已减¥25</span>
                  </div>
                </div>

                <div className="mt-4 pt-3 border-t border-dashed border-gray-100 flex items-center justify-between">
                   <div className="flex items-center text-xs text-gray-600">
                     可选: <Heart className="w-3.5 h-3.5 mx-1 text-gray-400" /> 升级为舒适型 <Info className="w-3.5 h-3.5 ml-1 text-gray-400" />
                   </div>
                   <div className="flex items-center text-xs font-medium">
                     免费升级 <div className="w-4 h-4 rounded-full border border-gray-300 ml-1"></div>
                   </div>
                </div>
              </div>


              {/* 第三方报价 SKU - 动态回显特效 */}
              <div className={`bg-white rounded-2xl transition-all duration-300 ${
                  selectedSku.startsWith('more-') ? 'border-2 border-black ring-4 ring-gray-100' : 'border-2 border-transparent'
                }`}>
                
                <div className="p-4 cursor-pointer" onClick={handleMoreCardClick}>
                  <div className="flex justify-between items-start">
                    <div className="flex items-start space-x-3">
                      <div className="relative">
                         <div className="absolute top-0 left-0 bg-gray-300 text-white text-[8px] px-1 rounded-sm z-10">MORE</div>
                         <CarIcon type="box" />
                      </div>
                      <div>
                        <div className="flex items-center space-x-2">
                          <span className="text-lg font-bold text-gray-900">第三方报价</span>
                          <div className="flex items-center text-gray-500 text-xs">
                            <User className="w-3.5 h-3.5 mr-0.5" /> 4
                            <Briefcase className="w-3.5 h-3.5 ml-1.5 mr-0.5" /> 2
                            <Info className="w-3.5 h-3.5 ml-1.5" />
                          </div>
                        </div>
                        {/* 动态回显当前选中的子项信息 */}
                        <div className="flex items-center text-sm text-gray-700 mt-1 transition-all duration-300">
                          <span className="font-medium">{activeMore.provider} | {activeMore.title}</span>
                        </div>
                        <div className="text-xs text-gray-500 mt-1">
                          {activeMore.tags}
                        </div>
                      </div>
                    </div>

                    <div className="text-right">
                      <span className="text-xl font-bold text-gray-900 transition-all duration-300">¥{activeMore.price}</span>
                    </div>
                  </div>

                  {/* 展开/收起 触发按钮 */}
                  <div className="mt-4 flex items-center justify-center text-xs text-gray-400">
                    查看更多3个报价 {isMoreBrandsExpanded ? <ChevronUp className="w-4 h-4 ml-1" /> : <ChevronDown className="w-4 h-4 ml-1" />}
                  </div>
                </div>

                {/* 展开的内容区域 (动效核心) */}
                <div 
                  className={`transition-all duration-500 ease-in-out overflow-hidden bg-gray-50 rounded-b-2xl ${
                    isMoreBrandsExpanded ? 'max-h-[500px] opacity-100 border-t border-gray-100' : 'max-h-0 opacity-0'
                  }`}
                >
                  <div className="p-4 space-y-3">
                    {/* 遍历渲染子项配置数据 */}
                    {moreOptions.map((opt) => (
                      <div 
                        key={opt.id}
                        onClick={(e) => handleSubItemClick(e, opt)}
                        className={`flex justify-between items-center p-3 rounded-xl cursor-pointer transition-colors ${
                          selectedSku === opt.id ? 'bg-blue-50 border border-blue-200' : 'bg-white hover:bg-gray-100'
                        }`}
                      >
                        <div>
                          <div className="font-bold text-sm text-gray-800">{opt.title}</div>
                          <div className="text-xs text-gray-500 mt-0.5">{opt.provider}</div>
                          <div className="text-xs text-gray-500 mt-1">{opt.tags}</div>
                        </div>
                        <div className="font-bold text-gray-900">¥{opt.price}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* 6座商务车 SKU */}
              <div 
                onClick={() => handleSelect('business', 113)}
                className={`bg-white rounded-2xl p-4 transition-all duration-200 cursor-pointer ${
                  selectedSku === 'business' ? 'border-2 border-black ring-4 ring-gray-100' : 'border-2 border-transparent'
                }`}
              >
                <div className="flex justify-between items-start">
                  <div className="flex items-start space-x-3">
                    <div className="mt-1">
                      <CarIcon type="van" />
                    </div>
                    <div>
                      <div className="flex items-center space-x-2">
                        <span className="text-lg font-bold text-gray-900">6座商务车</span>
                        <div className="flex items-center text-gray-500 text-xs">
                          <User className="w-3.5 h-3.5 mr-0.5" /> 6
                          <Briefcase className="w-3.5 h-3.5 ml-1.5 mr-0.5" /> 4
                          <Info className="w-3.5 h-3.5 ml-1.5" />
                        </div>
                      </div>
                      <div className="flex items-center text-sm text-gray-700 mt-1">
                        <span className="font-medium">携程专车</span>
                      </div>
                      <div className="flex items-center text-xs text-gray-500 mt-1">
                        <CheckCircle2 className="w-3 h-3 mr-1 text-gray-400" /> 无限免费等 · 随时取消 · 迟到免单
                      </div>
                      <div className="flex space-x-1 mt-2">
                        <span className="bg-[#f5f5f5] text-gray-600 text-[10px] px-1.5 py-0.5 rounded-sm">瓶装水</span>
                        <span className="bg-[#f5f5f5] text-gray-600 text-[10px] px-1.5 py-0.5 rounded-sm">纸巾</span>
                        <span className="bg-[#f5f5f5] text-gray-600 text-[10px] px-1.5 py-0.5 rounded-sm">充电线</span>
                      </div>
                    </div>
                  </div>

                  <div className="text-right flex flex-col items-end">
                    <div className="flex items-baseline space-x-1">
                      <span className="text-xs text-gray-400 line-through">¥153</span>
                      <span className="text-xl font-bold text-gray-900">¥113</span>
                    </div>
                    <span className="text-[10px] text-[#ff5a5f] bg-red-50 px-1 py-0.5 rounded mt-1">已减¥40</span>
                  </div>
                </div>
                
                <div className="mt-4 pt-3 border-t border-dashed border-gray-100 text-xs text-gray-600">
                   可选: 举牌接机
                </div>
              </div>

              {/* 奔驰豪华型 SKU */}
              <div 
                onClick={() => handleSelect('luxury', 240)}
                className={`bg-white rounded-2xl p-4 transition-all duration-200 cursor-pointer ${
                  selectedSku === 'luxury' ? 'border-2 border-black ring-4 ring-gray-100' : 'border-2 border-transparent'
                }`}
              >
                <div className="flex justify-between items-start">
                  <div className="flex items-start space-x-3">
                    <div className="mt-1">
                      <CarIcon type="luxury" />
                    </div>
                    <div>
                      <div className="flex items-center space-x-2">
                        <span className="text-lg font-bold text-gray-900">奔驰豪华型</span>
                        <div className="flex items-center text-gray-500 text-xs">
                          <User className="w-3.5 h-3.5 mr-0.5" /> 4
                          <Briefcase className="w-3.5 h-3.5 ml-1.5 mr-0.5" /> 2
                          <Info className="w-3.5 h-3.5 ml-1.5" />
                        </div>
                      </div>
                      <div className="flex items-center text-sm text-gray-700 mt-1">
                        <span className="font-medium">携程豪华车</span>
                      </div>
                      <div className="flex items-center text-xs text-gray-500 mt-1">
                        <CheckCircle2 className="w-3 h-3 mr-1 text-gray-400" /> 无限免费等 · 随时取消 · 迟到免单
                      </div>
                      <div className="flex space-x-1 mt-2">
                        <span className="bg-[#f5f5f5] text-gray-600 text-[10px] px-1.5 py-0.5 rounded-sm">瓶装水</span>
                        <span className="bg-[#f5f5f5] text-gray-600 text-[10px] px-1.5 py-0.5 rounded-sm">商务正装</span>
                      </div>
                    </div>
                  </div>

                  <div className="text-right flex flex-col items-end">
                    <div className="flex items-baseline space-x-1">
                      <span className="text-xs text-gray-400 line-through">¥310</span>
                      <span className="text-xl font-bold text-gray-900">¥240</span>
                    </div>
                    <span className="text-[10px] text-[#ff5a5f] bg-red-50 px-1 py-0.5 rounded mt-1">已减¥70</span>
                  </div>
                </div>
              </div>

              {/* 智能驾驶 SKU (科技感专属凸显样式) */}
              <div 
                onClick={() => handleSelect('autonomous', 24)}
                className={`rounded-2xl p-4 transition-all duration-300 cursor-pointer mb-8 relative overflow-hidden ${
                  selectedSku === 'autonomous' 
                  ? 'bg-gradient-to-br from-[#E6F4FF] to-[#BAE0FF] border-2 border-[#1677FF] ring-4 ring-[#E6F4FF] shadow-lg shadow-blue-100' 
                  : 'bg-gradient-to-br from-[#F5FAFF] to-[#E6F4FF] border-2 border-transparent hover:border-[#bae0ff]'
                }`}
              >
                {/* 科技感背景光效装饰 */}
                <div className="absolute -top-10 -right-10 w-32 h-32 bg-blue-400 opacity-10 rounded-full blur-2xl"></div>

                {/* 无人驾驶专属 Tag */}
                <div className="absolute top-0 right-0 bg-gradient-to-r from-blue-600 to-blue-400 text-white text-[11px] px-3 py-1 rounded-bl-xl font-bold shadow-md">
                  无人驾驶
                </div>

                <div className="flex justify-between items-start relative z-10 mt-1">
                  <div className="flex items-start space-x-3">
                    <div className="mt-1 relative">
                      {/* 车底蓝色科技光晕 */}
                      <div className="absolute -bottom-2 left-1/2 -translate-x-1/2 w-12 h-2 bg-blue-500 opacity-20 blur-sm rounded-[100%]"></div>
                      <CarIcon type="autonomous" />
                    </div>
                    <div>
                      <div className="flex items-center space-x-2">
                        <span className="text-lg font-bold text-gray-900">智能驾驶</span>
                        <div className="flex items-center text-gray-500 text-xs">
                          <User className="w-3.5 h-3.5 mr-0.5" /> 4
                          <Briefcase className="w-3.5 h-3.5 ml-1.5 mr-0.5" /> 2
                          <Info className="w-3.5 h-3.5 ml-1.5" />
                        </div>
                      </div>
                      <div className="flex items-center text-sm text-[#1677FF] font-semibold mt-1">
                        <span>小马智行</span>
                        <span className="mx-1.5 text-blue-200">|</span>
                        <span className="text-[10px] border border-[#1677FF] px-1 py-0.5 rounded-sm">L4级自动驾驶</span>
                      </div>
                      <div className="flex items-center text-xs text-gray-600 mt-1.5">
                        <CheckCircle2 className="w-3 h-3 mr-1 text-[#1677FF]" /> 免费等60分钟 · 用车前2小时免费取消
                      </div>
                    </div>
                  </div>

                  <div className="text-right flex flex-col items-end mt-3">
                    <div className="flex items-baseline space-x-1">
                      <span className="text-2xl font-bold text-[#1677FF]">¥24</span>
                    </div>
                  </div>
                </div>

                {/* 强化版下车点区域 */}
                <div className="relative z-10 mt-4 pt-3 border-t border-blue-200 border-dashed text-xs text-blue-800 bg-blue-50/60 rounded-lg p-2 flex items-center">
                  <MapPin className="w-3.5 h-3.5 mr-1 text-[#1677FF]" fill="currentColor" />
                  <span className="font-semibold">步行下车点:</span>&nbsp;荣京东街丽都，距离300m
                </div>
              </div>

            </div>

            {/* 底部浮动操作栏 */}
            <div className="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto bg-white rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.08)] z-30 pb-safe">
              <div className="p-4 px-5">
                {/* 用户信息与支付方式 */}
                <div className="flex justify-between items-center border-b border-gray-100 pb-3 mb-3">
                  <div className="text-[13px] text-gray-600 flex items-center cursor-pointer">
                    乘车人: Sherry 166****1384 <ChevronRightIcon className="w-3 h-3 ml-1 text-gray-400" />
                  </div>
                  <div className="text-[13px] text-gray-600 flex items-center cursor-pointer">
                    用车后付款·支付宝 <ChevronRightIcon className="w-3 h-3 ml-1 text-gray-400" />
                  </div>
                </div>

                {/* 价格与预订按钮 */}
                <div className="flex justify-between items-center pt-1">
                  <div className="flex items-baseline">
                    <span className="text-sm font-medium text-gray-800 mr-1">一口价</span>
                    <span className="text-xl font-bold text-gray-900 mr-1">¥</span>
                    <span className="text-3xl font-bold text-gray-900 leading-none transition-all duration-300">
                      {currentPrice}
                    </span>
                    <span className="text-xs text-gray-500 ml-2 flex items-center cursor-pointer">
                      明细 <ChevronRightIcon className="w-3 h-3 ml-0.5" />
                    </span>
                  </div>
                  
                  <button className="bg-[#1C1C1E] active:bg-black text-white px-8 py-3.5 rounded-xl font-bold text-lg shadow-lg shadow-gray-300 transition-transform active:scale-95">
                    立即预订
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // 渲染组件到 DOM
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<RideHailingApp />);
    </script>
</body>
</html>
